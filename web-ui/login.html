<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tokens.css?v=design4">
    <link rel="stylesheet" href="css/app-design.css?v=design4">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .login-shell {
            width: min(100%, 420px);
        }
        .login-brand {
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 18px;
        }
        .login-card {
            padding: 24px;
        }
        .login-title {
            margin: 0;
            font-size: 24px;
            line-height: 1.15;
            color: var(--heading);
            letter-spacing: 0;
        }
        .login-sub {
            margin: 7px 0 22px;
            color: var(--text-2);
            font-size: 13.5px;
        }
        .alert {
            display: none;
            margin: 0 0 16px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--err-soft);
            color: var(--err-text);
            font-size: 13px;
            font-weight: 600;
        }
        .alert.is-show {
            display: block;
        }
        .default-note {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            color: var(--text-3);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <div class="login-brand">
            <div class="brand-logo" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v4h-2V7a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1v4H4V7Zm-1 8a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v2a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-2Zm3-1a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1H6Z"/>
                </svg>
            </div>
            <div class="brand-name">Proxy Admin</div>
        </div>

        <section class="card login-card">
            <h1 class="login-title">Admin Login</h1>
            <p class="login-sub">HTTP/HTTPS Reverse Proxy</p>

            <form id="loginForm">
                <div class="field">
                    <label class="label" for="username">Username</label>
                    <input class="input mono" type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="field">
                    <label class="label" for="password">Password</label>
                    <input class="input mono" type="password" id="password" name="password" autocomplete="current-password" required>
                </div>

                <div id="alert" class="alert" role="alert"></div>

                <button class="btn btn-primary btn-block" type="submit" id="loginBtn">Login</button>
            </form>

            <div class="default-note mono">Default credentials: admin / admin123</div>
        </section>
    </main>

    <script>
        const loginForm = document.getElementById("loginForm");
        const alertDiv = document.getElementById("alert");
        const loginBtn = document.getElementById("loginBtn");

        function showError(message) {
            alertDiv.textContent = message;
            alertDiv.classList.add("is-show");
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            alertDiv.classList.remove("is-show");
            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await response.json();

                if (response.ok) {
                    window.location.href = "/admin/";
                    return;
                }
                showError(data.error || "Login failed");
            } catch (error) {
                console.error("Login error:", error);
                showError("Network error. Please try again.");
            }
        });
    </script>
</body>
</html>
